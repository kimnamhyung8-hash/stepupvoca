<html class="dark"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "secondary": "#8b5cf6",
                        "background-light": "#f8f7f5",
                        "background-dark": "#1a120b",
                        "card-dark": "#2d2419",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Lexend', sans-serif; }
        .three-d-shadow {
            box-shadow: 0 8px 0 #c66a0d;
            transition: transform 0.1s;
        }
        .three-d-shadow:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c66a0d;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .animated-sparkle {
            background-image: radial-gradient(circle, rgba(244, 140, 37, 0.2) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-x-hidden">
<!-- Header / Stats Bar -->
<header class="flex items-center justify-between px-6 py-4 sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="flex items-center gap-2">
<div class="bg-primary/20 p-1.5 rounded-lg border border-primary/30">
<span class="material-symbols-outlined text-primary text-2xl">menu_book</span>
</div>
<h1 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100">VocaQuest</h1>
</div>
<div class="flex items-center gap-4">

<span class="text-lg">🔥</span>
<span class="text-sm font-bold text-primary">7</span>
</div>
<div class="flex items-center gap-1.5 bg-card-dark/50 px-3 py-1.5 rounded-full border border-blue-500/20">
<span class="text-lg">💎</span>
<span class="text-sm font-bold text-blue-400">450</span>
</div>
<div class="size-10 rounded-full border-2 border-primary/50 overflow-hidden">
<div class="w-full h-full bg-cover bg-center" data-alt="User profile avatar icon" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuClNTT32l6z6ZOyT1mHoXWVjcrS3tWMMEnW4IDLZCZlheaP1wU1S4BGk1KZL-2qZplsY9VTHCj86v8ACP7AO9Ch--pQ_hCMJ6ZYBqx3Ty05OZO9J6jNdJ4-NkSVeSH-86zaByFffN6gG_YsWjLhdVF1dXEu3qe_48z43bQGMhC6dD6EBbjK3NwbyGJON904Erq9zO1aZ7wWGoVHvFZ98Og_j89Ab1fcF6NbYIENmyj6nosFFKeMVHGFKKxvsrKSphBnE99so3k_z2c')"></div>
</div>
</div>
</header>
<main class="flex-1 flex flex-col px-6 pb-24 relative animated-sparkle">
<!-- Level & Progress Section -->
<div class="mt-4 glass-panel rounded-2xl p-5 border-l-4 border-l-primary">
<div class="flex justify-between items-end mb-3">
<div class="flex flex-col">
<span class="text-xs font-bold uppercase tracking-wider text-slate-400">Current Rank</span>
<span class="text-2xl font-black text-primary">LV. 50</span>
</div>
<div class="text-right">
<span class="text-sm font-bold text-slate-300">75% to LV. 51</span>
</div>
</div>
<div class="w-full h-4 bg-slate-800 rounded-full overflow-hidden p-0.5 border border-slate-700">
<div class="h-full bg-gradient-to-r from-primary to-orange-400 rounded-full relative" style="width: 75%;">
<div class="absolute inset-0 bg-white/20 animate-pulse"></div>
</div>
</div>
</div>
<!-- Mascot / Hero Area -->
<div class="flex-1 flex flex-col items-center justify-center py-8">
<div class="relative group">

<div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full scale-125 opacity-50"></div>
<div class="relative z-10 w-64 h-64 bg-center bg-no-repeat bg-contain" data-alt="3D cute orange robot mascot holding a book" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBCbJv06X0lX2yf-4M5UbMI5v3Ad4U7rPFPiew08OIJ61vj3U3TA59EOjiva9yZ3yx1CaKMlIkuWXBEdKr-UVk6CrnLg0FFQ8ja0hQsDO9VAge_dMxCYbNAbrp0AK2BZboTeXrR0V8AH1TjXXgrTJKRKHFgAKg3yQSCvTw0ceTnbBb8h1Ygzc657-7JPvxkqeXa_5-J-jf_-qCRdvwwwOhY6Fx75qm1vUOs0TRTvRVp6qNdxIK0UybfRa2wkN3m8idzpX9e94yqJGY')">
</div>
<!-- Floating Level Tag -->
<div class="absolute -top-4 -right-4 bg-secondary text-white px-4 py-2 rounded-xl font-bold text-sm shadow-lg rotate-12">
                    EXPERT
                </div>
</div>
<div class="text-center mt-6">
<h2 class="text-3xl font-black mb-2 text-slate-900 dark:text-slate-100">Ready to Conquer?</h2>
<p class="text-slate-400 font-medium px-8">Today's target: 20 new Korean verbs and 5 idiomatic expressions.</p>
</div>
</div>
<!-- Call to Action Section -->
<div class="mt-auto space-y-4">
<button class="w-full bg-primary text-white py-5 rounded-2xl font-black text-2xl uppercase tracking-widest three-d-shadow flex items-center justify-center gap-3">
                도전 시작
                <span class="material-symbols-outlined text-3xl">play_arrow</span>
</button>
<div class="grid grid-cols-2 gap-4">
<button class="bg-card-dark p-4 rounded-xl border border-slate-700 flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-secondary text-3xl">auto_stories</span>
<span class="text-xs font-bold uppercase">Review</span>
</button>
<button class="bg-card-dark p-4 rounded-xl border border-slate-700 flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-blue-400 text-3xl">leaderboard</span>
<span class="text-xs font-bold uppercase">Leagues</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full glass-panel border-t border-slate-800 px-4 pb-8 pt-3 flex justify-between items-center z-50">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-1">home</span>
<span class="text-[10px] font-bold uppercase">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">menu_book</span>
<span class="text-[10px] font-bold uppercase">Library</span>
</a>
<div class="relative -top-6">
<div class="size-14 bg-primary rounded-full flex items-center justify-center border-4 border-background-dark shadow-xl">
<span class="material-symbols-outlined text-white text-3xl">swords</span>
</div>
</div>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">emoji_events</span>
<span class="text-[10px] font-bold uppercase">Quest</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">account_circle</span>
<span class="text-[10px] font-bold uppercase">Profile</span>
</a>
</nav>
