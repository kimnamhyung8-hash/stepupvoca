<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .glossy-card {
            background: linear-gradient(145deg, rgba(244, 140, 37, 0.2), rgba(34, 25, 16, 0));
        }
        .three-d-btn {
            box-shadow: 0 6px 0 0 rgba(244, 140, 37, 0.4);
            transition: transform 0.1s;
        }
        .three-d-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 rgba(244, 140, 37, 0.4);
        }
        .bg-mesh {
            background-image: radial-gradient(at 0% 0%, rgba(244, 140, 37, 0.1) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(244, 140, 37, 0.05) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between px-6 pt-12 pb-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800/50">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex flex-col items-center">
<span class="text-xs font-bold uppercase tracking-widest text-primary">Challenge</span>
<h2 class="text-lg font-bold">VocaQuest</h2>
</div>
<div class="bg-primary/20 border border-primary/40 px-3 py-1 rounded-full">
<span class="text-primary font-bold text-sm">LV. 50</span>
</div>
</header>
<!-- Progress & Anti-Cheat -->
<div class="px-6 flex flex-col gap-4">
<div class="flex justify-between items-end mb-1">
<span class="text-xs font-semibold text-slate-500 uppercase">Progress</span>
<span class="text-sm font-bold">1 / 20</span>
</div>
<!-- Progress Bar (Timer) -->
<div class="w-full h-3 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden border border-slate-300 dark:border-slate-700 shadow-inner">
<div class="h-full bg-primary shadow-[0_0_12px_rgba(244,140,37,0.8)]" style="width: 65%;"></div>
</div>
<!-- Anti-cheat Monitoring -->
<div class="flex items-center justify-center gap-2 mt-2">
<span class="material-symbols-outlined text-red-500 text-sm animate-pulse" style="font-variation-settings: 'FILL' 1">videocam</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">Eye tracking active</span>
</div>
</div>
<!-- Main Question Area -->
<main class="flex-1 flex flex-col items-center justify-center px-6 text-center bg-mesh">
<div class="relative group">
<!-- Floating particles effect simulated with absolute divs -->
<div class="absolute -top-8 -left-8 w-2 h-2 bg-primary/30 rounded-full blur-sm"></div>
<div class="absolute top-12 -right-12 w-3 h-3 bg-primary/20 rounded-full blur-sm"></div>
<div class="absolute -bottom-10 right-4 w-1.5 h-1.5 bg-primary/40 rounded-full blur-sm"></div>
<h1 class="text-5xl font-bold tracking-tight mb-4 text-slate-900 dark:text-white drop-shadow-sm">
                ubiquitous
            </h1>
<p class="text-slate-500 dark:text-slate-400 italic text-lg max-w-xs leading-relaxed">
                "Smartphones have become <span class="text-primary">ubiquitous</span> in modern society."
            </p>
</div>
</main>
<!-- Answer Grid -->
<div class="px-6 pb-12">
<div class="grid grid-cols-2 gap-4">
<!-- Option 1 -->
<button class="three-d-btn flex flex-col items-center justify-center p-6 bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-xl hover:border-primary transition-colors">
<span class="text-xs font-bold text-slate-400 uppercase mb-1">A</span>
<span class="font-bold text-center">Rare or scarce</span>
</button>
<!-- Option 2 -->
<button class="three-d-btn flex flex-col items-center justify-center p-6 bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-xl hover:border-primary transition-colors">
<span class="text-xs font-bold text-slate-400 uppercase mb-1">B</span>
<span class="font-bold text-center">Highly complex</span>
</button>
<!-- Option 3 -->
<button class="three-d-btn flex flex-col items-center justify-center p-6 bg-primary dark:bg-primary border-2 border-primary rounded-xl text-white shadow-[0_6px_0_0_#c4701e]">
<span class="text-xs font-bold text-primary-200 uppercase mb-1 opacity-80">C</span>
<span class="font-bold text-center">Found everywhere</span>
</button>
<!-- Option 4 -->
<button class="three-d-btn flex flex-col items-center justify-center p-6 bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-xl hover:border-primary transition-colors">
<span class="text-xs font-bold text-slate-400 uppercase mb-1">D</span>
<span class="font-bold text-center">Limited time</span>
</button>
</div>
</div>
<!-- Bottom Navigation Bar Component Modification -->
<nav class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-4">
<div class="flex items-center justify-between">
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Home</p>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">sports_esports</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Quest</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Rank</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Profile</p>
</a>
</div>
</nav>
<!-- Floating Background Elements (Cosmetic) -->
<div class="fixed top-1/4 -left-10 w-24 h-24 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-1/4 -right-10 w-32 h-32 bg-primary/10 rounded-full blur-3xl -z-10"></div>
</body></html>
